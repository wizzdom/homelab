repos:
  - repo: local
    hooks:
      - id: nomad-fmt
        name: nomad fmt
        entry: nomad fmt
        language: system
        files: ^nomad/.*\.(nomad|nomad\.hcl|hcl)$
        pass_filenames: true

      - id: nomad-validate
        name: nomad job validate
        entry: bash -c 'for file in "$@"; do nomad job validate "$file" || exit 1; done' --
        language: system
        files: ^nomad/.*\.(nomad|nomad\.hcl|hcl)$
        pass_filenames: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-symlinks
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key
